server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
            
        - id: chatbot-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/chat/**
        
        - id: chatbot-websocket
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/chat/**
            
        - id: analytics-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/analytics/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
