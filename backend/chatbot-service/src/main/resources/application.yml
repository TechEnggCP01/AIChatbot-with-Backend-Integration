server:
  port: 8083

spring:
  application:
    name: chatbot-service
  datasource:
    url: jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

rabbitmq:
  exchange: chatbot.exchange
  routing-key: chatbot.routing.key
